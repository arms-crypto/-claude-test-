# SearXNG 설정 - Perplexica 연동용
use_default_settings: true

general:
  debug: false
  instance_name: "SearXNG (Perplexica)"

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "perplexica-searxng-secret-key-change-me"

ui:
  default_locale: "ko"
  default_theme: simple

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "ko-KR"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: g
    categories: general
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    categories: general
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    categories: general
    disabled: false

  - name: google news
    engine: google_news
    shortcut: gn
    categories: news
    disabled: false

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
